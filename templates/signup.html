<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('{{ url_for('static', filename='signup_bg.jpg') }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* Logo styling */
        .logo {
            position: absolute;
            top: 15px;
            left: 25px;
            z-index: 1000;
        }

        .logo img {
            height: 140px;
            width: auto;
        }

        .overlay {
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .form-container input,
        .form-container button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            border-radius: 6px;
        }

        .form-container input {
            border: none;
        }

        .form-container button {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        .form-container button:hover {
            background-color: #218838;
        }

        /* Error message style */
        #message {
            color: #ffcccc;
            font-size: 14px;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<!-- Top-Left Logo -->
<div class="logo">
    <a href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="NexaBiz Logo">
    </a>
</div>

<div class="overlay">
    <div class="form-container">
        <h2>Sign Up</h2>
        <form method="POST" onsubmit="return validatePassword()">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>

            <p id="message"></p>

            <button type="submit">Register</button>
        </form>
    </div>
</div>

<script>
function validatePassword() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;
    const message = document.getElementById("message");

    // Regex for strong password
    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@#$%^&+=!]).{8,}$/;

    if (!regex.test(password)) {
        message.textContent = "Password must have at least 8 characters, including uppercase, lowercase, number, and special character (@, #, $, %).";
        return false;
    }

    if (password !== confirm) {
        message.textContent = "Passwords do not match!";
        return false;
    }

    message.textContent = "";
    return true;
}
</script>

</body>
</html>
